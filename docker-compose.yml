services:

  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    container_name: airbnb_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-airbnb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - airbnb_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-airbnb}"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION:-8.13.2}
    container_name: airbnb_elasticsearch
    hostname: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      node.name: elasticsearch
      cluster.name: airbnb-cluster
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - airbnb_network
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:${STACK_VERSION:-8.13.2}
    container_name: airbnb_kibana
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    volumes:
      - kibana_data:/usr/share/kibana/data
    networks:
      - airbnb_network
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  kibana-setup:
    image: curlimages/curl:8.7.1
    container_name: airbnb_kibana_setup
    depends_on:
      kibana:
        condition: service_healthy
    volumes:
      - ./docs/kibana:/tmp/kibana
    networks:
      - airbnb_network
    command: >
      sh -c "
        echo 'Waiting for Kibana API to be fully available...';
        sleep 10;
        echo 'Importing Kibana dashboard...';
        curl -s -X POST 'http://kibana:5601/api/saved_objects/_import?overwrite=true' \
          -H 'kbn-xsrf: true' \
          --form file=@'/tmp/kibana/NYC Airbnb Analytics Kibana Dashboard.ndjson';
        echo '\nDashboard imported successfully!';
      "

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airbnb_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    networks:
      - airbnb_network
    entrypoint: >
      /bin/bash -c "
      python -c \"import psycopg2; conn=psycopg2.connect(host='postgres', user='${POSTGRES_USER:-postgres}', password='${POSTGRES_PASSWORD:-postgres}'); conn.autocommit=True; cur=conn.cursor(); cur.execute('CREATE DATABASE airflow')\" || true &&
      airflow db migrate && 
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airbnb_airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW__WEBSERVER__SECRET_KEY: this_is_a_very_secret_key
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./docker/elasticsearch/airbnb_mapping.json:/app/airbnb_mapping.json
    networks:
      - airbnb_network
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airbnb_airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-airbnb}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      ELASTICSEARCH_HOST: http://elasticsearch:9200
      ELASTICSEARCH_INDEX: ${ELASTICSEARCH_INDEX:-airbnb_listings}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./docker/elasticsearch/airbnb_mapping.json:/app/airbnb_mapping.json
    networks:
      - airbnb_network
    command: scheduler

volumes:
  postgres_data:
  elasticsearch_data:
  kibana_data:

networks:
  airbnb_network:
    driver: bridge
